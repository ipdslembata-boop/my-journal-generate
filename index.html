<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiet Studio - Apple Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Menggunakan Inter sebagai alternatif SF Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-soft: #e9edc9; 
            --paper: #fefae0;   
            --ink: #1a1a1a;     /* Hitam hampir pekat ala Apple */
            --highlight: #ffea00;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-soft);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--ink);
            -webkit-font-smoothing: antialiased; /* Membuat font lebih halus di layar */
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .editor-section { width: 100% !important; order: 2; padding: 20px; }
            .preview-section { width: 100% !important; order: 1; padding: 20px; }
        }

        /* Sidebar Editor */
        .editor-section {
            width: 380px;
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        textarea {
            flex-grow: 1;
            padding: 15px;
            border: 1.5px solid #ccd5ae;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
            background: #fafafa;
            font-family: 'Inter', sans-serif;
        }

        .hint-box {
            background: #fefae0;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 11px;
            color: #606c38;
            border-left: 4px solid #606c38;
        }

        .btn-export {
            padding: 16px;
            background: #1a1a1a; /* Tombol hitam elegan */
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: -0.01em;
        }

        /* Preview Area (1080x1350) */
        .preview-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
        }

        .ig-portrait {
            width: 400px; 
            height: 500px; 
            background: var(--paper);
            padding: 35px 45px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .header-journal {
            border-bottom: 1px solid rgba(0,0,0,0.1); /* Garis tipis minimalis */
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }

        .date-label { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; opacity: 0.4; }
        .page-counter { font-size: 10px; font-weight: 700; opacity: 0.3; }

        .text-wrap {
            font-size: 16px;
            line-height: 1.6;
            color: var(--ink);
            height: 380px; 
            overflow: hidden;
            letter-spacing: -0.011em; /* Ciri khas SF Pro */
            font-weight: 400;
        }

        /* Markdown Styles */
        .md-h1 { 
            font-size: 28px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 15px; 
            line-height: 1.1; 
            letter-spacing: -0.03em; /* Judul lebih rapat ala Apple */
        }
        .md-bold { font-weight: 600; } /* Apple jarang pakai 700 untuk teks biasa */
        .md-italic { font-style: italic; opacity: 0.9; }
        .md-hl { background-color: var(--highlight); padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="editor-section">
        <h2 style="margin-top:0; font-weight: 700; letter-spacing: -0.04em;">Quiet Studio</h2>
        <textarea id="main-input" placeholder="Apa yang sedang kamu pikirkan?"></textarea>
        
        <div class="hint-box">
            **Judul** | *Tebal* | \Miring\ | \\Highlight\\
        </div>

        <button class="btn-export" onclick="downloadAll()">Export PNG (1080x1350)</button>
    </div>

    <div class="preview-section" id="canvas-container"></div>

    <script>
        const input = document.getElementById('main-input');
        const container = document.getElementById('canvas-container');
        const dateStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

        function applyMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<span class="md-h1">$1</span>')
                .replace(/\\\\(.*?)\\\\/g, '<span class="md-hl">$1</span>')
                .replace(/\*(.*?)\*/g, '<span class="md-bold">$1</span>')
                .replace(/\\(.*?)\\/g, '<span class="md-italic">$1</span>');
        }

        function renderPages() {
            container.innerHTML = '';
            const content = input.value || "Mulai menulis...";
            const paragraphs = content.split('\n');
            
            let pNum = 1;
            let activePage = createNewPage(pNum);
            let activeArea = activePage.querySelector('.text-wrap');

            paragraphs.forEach(p => {
                const pEl = document.createElement('div');
                pEl.style.marginBottom = '14px';
                pEl.innerHTML = applyMarkdown(p);
                activeArea.appendChild(pEl);

                if (activeArea.scrollHeight > 380) {
                    activeArea.removeChild(pEl);
                    pNum++;
                    activePage = createNewPage(pNum);
                    activeArea = activePage.querySelector('.text-wrap');
                    activeArea.appendChild(pEl);
                }
            });
        }

        function createNewPage(n) {
            const el = document.createElement('div');
            el.className = 'ig-portrait';
            el.innerHTML = `
                <div class="header-journal">
                    <span class="date-label">${dateStr}</span>
                    <span class="page-counter">SLIDE ${n}</span>
                </div>
                <div class="text-wrap"></div>
            `;
            container.appendChild(el);
            return el;
        }

        input.addEventListener('input', renderPages);
        renderPages();

        async function downloadAll() {
            const pages = document.querySelectorAll('.ig-portrait');
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { 
                    scale: 3, 
                    backgroundColor: '#fefae0',
                    scrollX: 0,
                    scrollY: -window.scrollY
                });
                const link = document.createElement('a');
                link.download = `Apple-Journal-${i+1}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }
    </script>
</body>
</html>
