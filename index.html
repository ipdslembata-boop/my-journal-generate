<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Journal with Soft Shadow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-ui: #f1f5f9;
            --primary: #1e293b;
            --highlight: #fde047;
            /* Shadow yang sangat halus */
            --soft-shadow: 1px 1px 2px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ui);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .editor-section { width: 100% !important; height: auto !important; order: 2; padding: 20px; }
            .preview-section { width: 100% !important; order: 1; padding: 20px 10px; }
        }

        .editor-section {
            width: 400px;
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e2e8f0;
            box-sizing: border-box;
            z-index: 10;
        }

        textarea {
            flex-grow: 1;
            padding: 15px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
            font-family: 'Inter', sans-serif;
        }

        .hint-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 11px;
            color: #475569;
            border-left: 4px solid var(--primary);
        }

        .btn-export {
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-export:hover { opacity: 0.9; }

        .preview-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
            background: #cbd5e1;
        }

        .ig-portrait {
            width: 400px; 
            height: 500px; 
            background: #fff;
            padding: 25px 45px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .header-journal {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .text-wrap {
            font-family: 'Lora', serif;
            font-size: 16px;
            line-height: 1.7;
            color: #334155;
            height: 410px;
            overflow: hidden;
            /* Shadow tipis untuk teks utama */
            text-shadow: var(--soft-shadow);
        }

        /* Markdown Styles */
        .md-h1 { 
            font-size: 24px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 8px; 
            color: #0f172a; 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.5px; 
            line-height: 1.2;
            /* Shadow sedikit lebih tegas untuk judul */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .md-bold { font-weight: 700; color: #000; }
        .md-italic { font-style: italic; }
        
        .md-highlight { 
            background-color: var(--highlight); 
            padding: 2px 4px; 
            border-radius: 4px; 
            display: inline;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            text-shadow: none; /* Hilangkan shadow di atas highlight agar bersih */
        }
        
        .line-container { margin-bottom: 4px; min-height: 1em; }
        
        .md-bullet { display: flex; align-items: flex-start; gap: 8px; }
        .md-bullet::before { content: "•"; color: var(--primary); font-weight: bold; flex-shrink: 0; }
        
        .md-check { display: flex; align-items: flex-start; gap: 8px; }
        .md-check::before { content: "✔"; color: #10b981; font-size: 12px; margin-top: 4px; flex-shrink: 0; }

    </style>
</head>
<body>

    <div class="editor-section
