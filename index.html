<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IG Portrait Journal (4:5)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-ui: #f1f5f9;
            --primary: #0f172a;
            --highlight: #fde047; /* Kuning cerah */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ui);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .editor-section { width: 100% !important; height: auto !important; order: 2; padding: 20px; }
            .preview-section { width: 100% !important; order: 1; padding: 20px 10px; }
        }

        /* Sidebar Editor */
        .editor-section {
            width: 380px;
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e2e8f0;
            box-sizing: border-box;
            z-index: 10;
        }

        textarea {
            flex-grow: 1;
            padding: 15px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
            font-family: 'Inter', sans-serif;
        }

        .hint-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 11px;
            color: #475569;
            border-left: 4px solid var(--primary);
        }

        .btn-group { display: flex; gap: 10px; flex-direction: column; }

        .btn-export {
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-export:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Preview Area (Instagram 1080x1350) */
        .preview-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 60px;
            overflow-y: auto;
            background: #cbd5e1;
        }

        .ig-portrait {
            width: 400px; 
            height: 500px; 
            background: #fff;
            padding: 30px 45px; /* Padding atas dikurangi agar header lebih ke atas */
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: relative;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .header-journal {
            border-bottom: 2px solid #1e293b;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 6px;
        }

        .date-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #1e293b; }
        .page-counter { font-size: 11px; font-weight: 700; color: #94a3b8; }

        /* Content Constraints */
        .text-wrap {
            font-family: 'Lora', serif;
            font-size: 17px;
            line-height: 1.8;
            color: #334155;
            height: 380px; /* Area teks lebih tinggi karena footer dihapus */
            overflow: hidden;
        }

        /* Markdown Styles */
        .md-h1 { 
            font-size: 26px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 12px; 
            color: #0f172a; 
            line-height: 1.2;
            font-family: 'Inter', sans-serif;
        }
        .md-bold { font-weight: 700; color: #000; }
        .md-italic { font-style: italic; }
        .md-highlight { background-color: var(--highlight); padding: 0 2px; border-radius: 2px; }

    </style>
</head>
<body>

    <div class="editor-section">
        <h2 style="margin-top:0">Journal Editor</h2>
        <textarea id="main-input" placeholder="Apa yang ingin kamu ceritakan hari ini?"></textarea>
        
        <div class="hint-box">
            <b>Formatting Tips:</b><br>
            • <b>**Judul**</b><br>
            • <b>*Tebal*</b><br>
            • <b>\Miring\</b><br>
            • <b>\\Highlight\\</b>
        </div>

        <div class="btn-group">
            <button class="btn-export" onclick="downloadAll()">Simpan Semua Halaman (PNG)</button>
        </div>
    </div>

    <div class="preview-section" id="canvas-container">
        <!-- Generated Pages -->
    </div>

    <script>
        const input = document.getElementById('main-input');
        const container = document.getElementById('canvas-container');
        const dateStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

        function applyMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<span class="md-h1">$1</span>') // Judul
                .replace(/\\\\(.*?)\\\\/g, '<span class="md-highlight">$1</span>') // Highlight
                .replace(/\*(.*?)\*/g, '<span class="md-bold">$1</span>') // Bold
                .replace(/\\(.*?)\\/g, '<span class="md-italic">$1</span>'); // Italic
        }

        function renderPages() {
            container.innerHTML = '';
            const content = input.value || "Mulai tuliskan ulasan buku, film, atau ceritamu...";
            const paragraphs = content.split('\n');
            
            let pNum = 1;
            let activePage = createNewPage(pNum);
            let activeArea = activePage.querySelector('.text-wrap');

            paragraphs.forEach(p => {
                const pEl = document.createElement('div');
                pEl.style.marginBottom = '15px';
                pEl.innerHTML = applyMarkdown(p);
                
                activeArea.appendChild(pEl);

                // Cek tinggi (380px sekarang)
                if (activeArea.scrollHeight > 380) {
                    activeArea.removeChild(pEl);
                    
                    pNum++;
                    activePage = createNewPage(pNum);
                    activeArea = activePage.querySelector('.text-wrap');
                    activeArea.appendChild(pEl);
                }
            });
        }

        function createNewPage(n) {
            const el = document.createElement('div');
            el.className = 'ig-portrait';
            el.innerHTML = `
                <div class="header-journal">
                    <span class="date-label">${dateStr}</span>
                    <span class="page-counter">SLIDE ${n}</span>
                </div>
                <div class="text-wrap"></div>
            `;
            container.appendChild(el);
            return el;
        }

        input.addEventListener('input', renderPages);
        renderPages();

        async function downloadAll() {
            const pages = document.querySelectorAll('.ig-portrait');
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { 
                    scale: 2.7, 
                    backgroundColor: '#ffffff',
                    useCORS: true
                });
                
                const link = document.createElement('a');
                link.download = `IG-Journal-Page-${i+1}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }
    </script>
</body>
</html>
