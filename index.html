<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Signature Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-900: #0f172a;
            --slate-600: #475569;
            --paper: #fcfaf7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--slate-900);
        }

        @media (max-width: 900px) {
            body { flex-direction: column; height: auto; }
            .sidebar { width: 100% !important; padding: 20px !important; }
            .preview-area { padding: 20px 10px !important; }
        }

        /* Sidebar: Clean & Functional */
        .sidebar {
            width: 400px;
            background: #ffffff;
            padding: 40px 30px;
            overflow-y: auto;
            border-right: 1px solid #cbd5e1;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        h2 { font-size: 1.1rem; letter-spacing: -0.02em; margin-bottom: 30px; opacity: 0.8; }
        
        .field { margin-bottom: 24px; }
        label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-600); display: block; margin-bottom: 8px; }
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 6px;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: all 0.2s;
        }

        input:focus, textarea:focus { border-color: var(--slate-900); outline: none; }

        .btn-download {
            width: 100%; padding: 16px; background: var(--slate-900); color: white;
            border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }

        /* Preview: The "Signature" Paper */
        .preview-area {
            flex-grow: 1; display: flex; justify-content: center; align-items: flex-start;
            padding: 60px; overflow-y: auto;
        }

        #journal-card {
            width: 100%; max-width: 600px; background: var(--paper);
            padding: 80px 60px; box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
            /* Subtle Paper Grain Effect */
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
        }

        #journal-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--slate-900);
        }

        .meta-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
            padding-bottom: 15px; margin-bottom: 40px;
        }

        .meta-header span { font-size: 0.7rem; font-weight: 600; color: var(--slate-600); }

        #out-title {
            font-family: 'Libre Baskerville', serif; font-size: 2.4rem;
            margin: 0 0 25px 0; line-height: 1.1; font-weight: 700;
        }

        #out-text {
            font-family: 'Libre Baskerville', serif; font-size: 1.15rem;
            line-height: 1.8; color: #1e293b; white-space: pre-wrap;
        }

        #chart-zone { 
            margin-top: 50px; padding-top: 30px; border-top: 1px dashed #cbd5e1;
            display: none; 
        }

        .watermark-footer {
            margin-top: 60px; display: flex; justify-content: space-between;
            font-size: 0.65rem; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>System Journal v2.0</h2>
        
        <div class="field">
            <label>Title</label>
            <input type="text" id="in-title" placeholder="Analisis Sektoral 2026">
        </div>

        <div class="field">
            <label>Journal Content</label>
            <textarea id="in-text" rows="8" placeholder="Tuliskan narasi profesional Anda di sini..."></textarea>
        </div>

        <div class="field">
            <label>Visualization</label>
            <select id="in-toggle-chart" onchange="toggleView()">
                <option value="hide">Text Only</option>
                <option value="show">Text + Analytics</option>
            </select>
        </div>

        <div id="data-fields" style="display: none;">
            <div class="field">
                <label>Chart Type</label>
                <select id="in-type" onchange="renderChart()">
                    <option value="bar">Bar Chart</option>
                    <option value="line">Line Chart</option>
                </select>
            </div>
            <div class="field">
                <label>Data Labels (Jan, Feb, Mar)</label>
                <input type="text" id="in-labels" oninput="renderChart()">
            </div>
            <div class="field">
                <label>Values (10, 20, 30)</label>
                <input type="text" id="in-data" oninput="renderChart()">
            </div>
        </div>

        <button class="btn-download" onclick="exportPNG()">Export Signature PNG</button>
    </div>

    <div class="preview-area">
        <div id="journal-card">
            <div class="meta-header">
                <span id="out-date"></span>
                <span>INTERNAL DATA REPORT</span>
            </div>

            <h1 id="out-title">Jurnal Tanpa Judul</h1>
            <div id="out-text">Draf catatan akan muncul di sini...</div>

            <div id="chart-zone">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="watermark-footer">
                <span>DIGITAL ARCHIVE SYSTEM</span>
                <span>CONFIDENTIAL</span>
            </div>
        </div>
    </div>

    <script>
        // Real-time Date
        const date = new Date();
        document.getElementById('out-date').innerText = date.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

        let chartInstance = null;

        function toggleView() {
            const mode = document.getElementById('in-toggle-chart').value;
            const fields = document.getElementById('data-fields');
            const zone = document.getElementById('chart-zone');
            
            fields.style.display = mode === 'show' ? 'block' : 'none';
            zone.style.display = mode === 'show' ? 'block' : 'none';
            if(mode === 'show') renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const labels = document.getElementById('in-labels').value.split(',') || [];
            const data = document.getElementById('in-data').value.split(',').map(Number) || [];
            const type = document.getElementById('in-type').value;

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Data Metric',
                        data: data,
                        backgroundColor: type === 'bar' ? '#0f172a' : 'transparent',
                        borderColor: '#0f172a',
                        borderWidth: 1.5,
                        tension: 0.2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Event Listeners
        document.getElementById('in-title').addEventListener('input', e => document.getElementById('out-title').innerText = e.target.value || "Jurnal Tanpa Judul");
        document.getElementById('in-text').addEventListener('input', e => document.getElementById('out-text').innerText = e.target.value || "Draf catatan...");

        function exportPNG() {
            const card = document.getElementById('journal-card');
            html2canvas(card, { scale: 3, backgroundColor: '#fcfaf7' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Signature_Journal_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
