<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Curator's IG Journal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f4f1ea;
            --ink: #1a1a1a;
            --accent: #8c7851;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #dcd7cc;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; height: auto; }
            .editor { width: 100% !important; border-right: none; }
            .preview { padding: 20px 10px !important; }
        }

        /* Editor Section */
        .editor {
            width: 380px;
            background: #ffffff;
            padding: 30px;
            overflow-y: auto;
            border-right: 1px solid #c2bdb3;
            box-sizing: border-box;
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 20px; color: var(--ink); }
        
        .field { margin-bottom: 20px; }
        label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #777; display: block; margin-bottom: 8px; }
        
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid #e2e2e2; border-radius: 4px;
            font-family: inherit; font-size: 0.9rem;
        }

        .btn-action {
            width: 100%; padding: 14px; background: var(--ink); color: white;
            border: none; border-radius: 4px; font-weight: 600; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }

        /* Canvas Section */
        .preview {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px; background: #dcd7cc;
        }

        #ig-canvas {
            width: 450px; height: 560px; /* Portrait IG Ratio */
            background: var(--cream);
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Aesthetic Grain */
        #ig-canvas::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.4; pointer-events: none;
        }

        .header-line { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: baseline; }
        .category { font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .date { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; }

        #title-out { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0 0 20px 0; line-height: 1.1; }
        
        /* Photo Box */
        #photo-wrap {
            width: 100%; height: 200px; background: #e8e4db; margin-bottom: 25px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(0,0,0,0.05); overflow: hidden;
            position: relative;
        }
        #img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-placeholder { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        #text-out {
            font-size: 0.95rem; line-height: 1.6; color: #333;
            display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Aesthetic Sticker Decor */
        .circle-sticker {
            position: absolute; bottom: 40px; right: 40px;
            width: 60px; height: 60px; border: 1px solid var(--accent);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 0.5rem; text-align: center; color: var(--accent);
            transform: rotate(15deg);
        }
    </style>
</head>
<body>

    <div class="editor">
        <h2>Curator's Studio</h2>
        
        <div class="field">
            <label>Kategori</label>
            <input type="text" id="in-cat" placeholder="Book Review / Movie / Thoughts">
        </div>

        <div class="field">
            <label>Judul</label>
            <input type="text" id="in-title" placeholder="Judul Karya">
        </div>

        <div class="field">
            <label>Upload Foto (Cover/Cuplikan)</label>
            <input type="file" id="in-img" accept="image/*" onchange="previewFile()">
        </div>

        <div class="field">
            <label>Review / Cerita</label>
            <textarea id="in-text" rows="6" placeholder="Bagikan apa yang kamu rasakan..."></textarea>
        </div>

        <button class="btn-action" onclick="exportIG()">Download PNG</button>
    </div>

    <div class="preview">
        <div id="ig-canvas">
            <div class="header-line">
                <span class="category" id="out-cat">PERSONAL JOURNAL</span>
                <span class="date" id="out-date"></span>
            </div>

            <div id="photo-wrap">
                <img id="img-preview" src="">
                <span class="photo-placeholder" id="ph-label">Visual Placeholder</span>
            </div>

            <h1 id="title-out">The Art of Storytelling</h1>
            <div id="text-out">Tuliskan ulasan atau pemikiranmu di sini untuk melihat desain yang estetik secara otomatis...</div>

            <div class="circle-sticker">
                CURATED<br>BY ME
            </div>
        </div>
    </div>

    <script>
        // Tanggal
        document.getElementById('out-date').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        // Preview Image
        function previewFile() {
            const preview = document.getElementById('img-preview');
            const file = document.getElementById('in-img').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = "block";
                document.getElementById('ph-label').style.display = "none";
            }

            if (file) { reader.readAsDataURL(file); }
        }

        // Live Update
        document.getElementById('in-cat').addEventListener('input', e => document.getElementById('out-cat').innerText = e.target.value || "PERSONAL JOURNAL");
        document.getElementById('in-title').addEventListener('input', e => document.getElementById('title-out').innerText = e.target.value || "Judul Karya");
        document.getElementById('in-text').addEventListener('input', e => document.getElementById('text-out').innerText = e.target.value || "Isi cerita...");

        // Export PNG
        function exportIG() {
            const node = document.getElementById('ig-canvas');
            html2canvas(node, { scale: 3, backgroundColor: '#f4f1ea' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Journal_IG_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
