<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal with Chart</title>
    <!-- Library untuk Grafik dan Ekspor Gambar -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f3f4f6; --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: row; height: 100vh; }
        
        /* Layout Mobile Friendly */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .editor, .preview { width: 100% !important; }
            .preview { order: 1; padding: 15px !important; background: #ddd !important; }
            .editor { order: 2; padding: 20px !important; }
        }

        .editor { width: 35%; background: white; padding: 25px; box-sizing: border-box; border-right: 1px solid #e5e7eb; overflow-y: auto; }
        .preview { width: 65%; display: flex; justify-content: center; align-items: flex-start; padding: 40px; box-sizing: border-box; overflow-y: auto; }

        /* Form Input */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }

        /* Tampilan Jurnal */
        #journal-paper {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .date { font-size: 12px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        #text-output { font-family: 'Lora', serif; font-size: 18px; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; }
        .chart-container { width: 100%; margin-top: 20px; }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="editor">
        <h3>📊 Data & Catatan</h3>
        
        <div class="input-group">
            <label>Judul Jurnal / Topik</label>
            <input type="text" id="title-input" placeholder="Contoh: Analisis Data Desa">
        </div>

        <div class="input-group">
            <label>Data Angka (Pisahkan dengan koma)</label>
            <input type="text" id="data-input" placeholder="Contoh: 10, 25, 45, 30" oninput="updateChart()">
        </div>

        <div class="input-group">
            <label>Label Data (Pisahkan dengan koma)</label>
            <input type="text" id="label-input" placeholder="Contoh: Jan, Feb, Mar, Apr" oninput="updateChart()">
        </div>

        <div class="input-group">
            <label>Narasi / Catatan</label>
            <textarea id="text-input" placeholder="Tuliskan penjelasan atau insight di sini..."></textarea>
        </div>

        <button class="btn-save" onclick="exportImage()">Simpan Jadi Gambar</button>
    </div>

    <div class="preview">
        <div id="journal-paper">
            <div class="date" id="current-date"></div>
            <h2 id="title-output" style="margin-top: 0; font-family: 'Lora', serif;">Judul Jurnal</h2>
            <div id="text-output">Narasi catatan kamu akan muncul di sini...</div>
            
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Tanggal
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Inisialisasi Grafik
        const ctx = document.getElementById('myChart').getContext('2d');
        let myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A', 'B', 'C', 'D'],
                datasets: [{
                    label: 'Nilai',
                    data: [12, 19, 3, 5],
                    backgroundColor: 'rgba(37, 99, 235, 0.5)',
                    borderColor: 'rgba(37, 99, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });

        // Update Text Realtime
        document.getElementById('text-input').addEventListener('input', (e) => {
            document.getElementById('text-output').innerText = e.target.value;
        });
        document.getElementById('title-input').addEventListener('input', (e) => {
            document.getElementById('title-output').innerText = e.target.value;
        });

        // Update Grafik Realtime
        function updateChart() {
            const dataVal = document.getElementById('data-input').value.split(',').map(Number);
            const labelVal = document.getElementById('label-input').value.split(',');

            if (dataVal.length > 0 && labelVal.length === dataVal.length) {
                myChart.data.labels = labelVal;
                myChart.data.datasets[0].data = dataVal;
                myChart.update();
            }
        }

        // Fungsi Ekspor Gambar
        function exportImage() {
            const paper = document.getElementById('journal-paper');
            html2canvas(paper, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `jurnal-statistik-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
