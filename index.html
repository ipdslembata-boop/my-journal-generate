<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Minimalist Journal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-ui: #f1f5f9;
            --primary: #1e293b;
            --highlight: #fde047;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ui);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .editor-section { width: 100% !important; height: auto !important; order: 2; padding: 20px; }
            .preview-section { width: 100% !important; order: 1; padding: 20px 10px; }
        }

        .editor-section {
            width: 400px;
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e2e8f0;
            box-sizing: border-box;
            z-index: 10;
        }

        textarea {
            flex-grow: 1;
            padding: 15px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        .hint-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 11px;
            color: #475569;
            border-left: 4px solid var(--primary);
        }

        .btn-export {
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .preview-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
            background: #cbd5e1;
        }

        .ig-portrait {
            width: 400px; 
            height: 500px; 
            background: #fff;
            padding: 25px 45px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .header-journal {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* Perbaikan utama pada Text Wrap */
        .text-wrap {
            font-family: 'Lora', serif;
            font-size: 16px;
            line-height: 1.7;
            color: #334155;
            height: 410px;
            overflow: hidden;
        }

        /* Markdown Styles */
        .md-h1 { font-size: 24px; font-weight: 700; display: block; margin-bottom: 8px; color: #0f172a; font-family: 'Inter', sans-serif; letter-spacing: -0.5px; line-height: 1.2; }
        .md-bold { font-weight: 700; color: #000; }
        .md-italic { font-style: italic; }
        
        /* Fix Highlight agar tidak meleber */
        .md-highlight { 
            background-color: var(--highlight); 
            padding: 2px 4px; 
            border-radius: 4px; 
            display: inline; /* Menggunakan inline agar membungkus teks */
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }
        
        /* Fix List agar sejajar */
        .line-container { margin-bottom: 4px; min-height: 1em; }
        
        .md-bullet { display: flex; align-items: flex-start; gap: 8px; }
        .md-bullet::before { content: "•"; color: var(--primary); font-weight: bold; flex-shrink: 0; }
        
        .md-check { display: flex; align-items: flex-start; gap: 8px; }
        .md-check::before { content: "✔"; color: #10b981; font-size: 12px; margin-top: 4px; flex-shrink: 0; }

    </style>
</head>
<body>

    <div class="editor-section">
        <h3 style="margin-top:0">Minimalist Journal</h3>
        <textarea id="main-input" placeholder="Tulis di sini..."></textarea>
        
        <div class="hint-box">
            <b>Markdown:</b><br>
            • **Judul** | *Tebal* | \Miring\ | \\Highlight\\<br>
            • <b>- </b> (Bullet) | <b>v </b> (Ceklis)
        </div>

        <button class="btn-export" onclick="downloadAll()">Export All Slides</button>
    </div>

    <div class="preview-section" id="canvas-container"></div>

    <script>
        const input = document.getElementById('main-input');
        const container = document.getElementById('canvas-container');
        const dateStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

        function applyMarkdown(text) {
            // Judul, Bold, Italic, Highlight
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<span class="md-h1">$1</span>')
                .replace(/\\\\(.*?)\\\\/g, '<span class="md-highlight">$1</span>')
                .replace(/\*(.*?)\*/g, '<span class="md-bold">$1</span>')
                .replace(/\\(.*?)\\/g, '<span class="md-italic">$1</span>');

            // Logika List
            if (html.trim().startsWith('- ')) {
                html = `<div class="md-bullet">${html.trim().substring(2)}</div>`;
            } else if (html.trim().startsWith('v ')) {
                html = `<div class="md-check">${html.trim().substring(2)}</div>`;
            }

            return html;
        }

        function renderPages() {
            container.innerHTML = '';
            const content = input.value || "Draft...";
            const lines = content.split('\n');
            
            let pNum = 1;
            let activePage = createNewPage(pNum);
            let activeArea = activePage.querySelector('.text-wrap');

            lines.forEach((line) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line-container';
                lineDiv.innerHTML = applyMarkdown(line);
                
                activeArea.appendChild(lineDiv);

                // Cek tinggi halaman
                if (activeArea.scrollHeight > 410) {
                    activeArea.removeChild(lineDiv);
                    pNum++;
                    activePage = createNewPage(pNum);
                    activeArea = activePage.querySelector('.text-wrap');
                    activeArea.appendChild(lineDiv);
                }
            });
        }

        function createNewPage(n) {
            const el = document.createElement('div');
            el.className = 'ig-portrait';
            el.innerHTML = `
                <div class="header-journal">
                    <span>${dateStr}</span>
                    <span>Slide ${n}</span>
                </div>
                <div class="text-wrap"></div>
            `;
            container.appendChild(el);
            return el;
        }

        input.addEventListener('input', renderPages);
        renderPages();

        async function downloadAll() {
            const pages = document.querySelectorAll('.ig-portrait');
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, backgroundColor: '#ffffff' });
                const link = document.createElement('a');
                link.download = `Slide-${i+1}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }
    </script>
</body>
</html>
